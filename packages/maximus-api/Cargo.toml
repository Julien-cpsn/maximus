[package]
name = "maximus-api"
version = "0.1.0"
authors = ["Julien-cpsn <julien.caposiena@gmail.com>"]
edition = "2021"

[dependencies]

maximus-shared-models = { workspace = true }

dioxus = { workspace = true, features = ["fullstack"] }

serde = { workspace = true }
serde_json = "1.0.149"

once_cell = { version = "1.21.3", features = ["parking_lot"] }
directories = "6.0.0"
dotenv = "0.15.0"
parking_lot = { version = "0.12.5", features = ["send_guard", "arc_lock"]}
base64 = "0.22.1"
rand = { version = "0.10.0", features = ["thread_rng"] }
anyhow = "1.0.102"
getrandom = { version = "0.4.1", features = ["wasm_js"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
matrix-sdk = { workspace = true, features = ["js"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
matrix-sdk = { workspace = true, features = ["sqlite"] }

[features]
server = ["dioxus/server"]
